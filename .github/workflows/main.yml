name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
          
